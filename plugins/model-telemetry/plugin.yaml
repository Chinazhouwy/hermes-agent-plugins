# Hermes 插件清单。修改核心代码时通常不需要改这里；发布新版本时更新 version。
name: model-telemetry
version: 1.3.0
description: "Report model usage, route interview sessions, and isolate each interview question's context."
author: codex

# 声明插件会使用的 Hermes 生命周期。具体函数绑定在 __init__.py 的 register()。
hooks:
  - pre_gateway_dispatch
  - pre_api_request
  - post_api_request
  - transform_llm_output
